[project]
name = "dooers-cli"
version = "0.5.0"
description = "Dooers CLI — push agents to Dooers, manage agent records, authenticate from the terminal"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    {name = "Dooers", email = "dev@dooers.ai"},
]
keywords = ["dooers", "cli", "deployment", "agents", "docker", "gcp"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]

dependencies = [
    "typer>=0.12.3",
    "httpx>=0.28.1",
    "pydantic>=2.13.2",
    "pyyaml>=6.0.2",
    "tqdm>=4.66.4",
    "dooers-protocol>=0.4.0",
]

[tool.uv.sources]
dooers-protocol = { path = "../dooers-protocol", editable = true }

[project.urls]
Repository = "https://github.com/Dooers-ai/dooers-cli"

[project.scripts]
dooers = "dooers.cli.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dooers"]

[project.optional-dependencies]
dev = [
    "mypy>=1.20.1",
    "poethepoet>=0.44.0",
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "respx>=0.21.1",
    "ruff>=0.15.11",
    "build>=1.4.3",
    "types-pyyaml>=6.0.0",
    "types-tqdm>=4.66.0",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "BLE"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
mypy_path = "src"
explicit_package_bases = true

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.poe.tasks]
format = "ruff format ."
"format:imports" = "ruff check --select I --fix ."
check = "ruff check ."
"check:fix" = "ruff check --fix ."
typecheck = "mypy -p dooers.cli"
test = "pytest"
"test:cov" = "pytest --cov=src --cov-report=term-missing"
dev = ["check", "typecheck", "test"]
build = "python -m build"
