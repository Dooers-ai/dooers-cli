[project]
name = "dooers-push"
version = "0.1.0"
description = "Dooers — push pipeline service (auditor → provisioner → deployer) backing `dooers push`"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [
    {name = "Dooers", email = "dev@dooers.ai"},
]
keywords = ["dooers", "push", "cloud-run", "deploy", "pipeline"]

dependencies = [
    "fastapi>=0.136.0",
    "uvicorn>=0.44.0",
    "pydantic>=2.13.2",
    "httpx>=0.28.1",
    "python-multipart>=0.0.20",
    "google-cloud-storage>=2.18.0",
    "google-cloud-build>=3.27.0",
    "google-cloud-compute>=1.20.0",
    "slowapi>=0.1.9",
    "dooers-protocol",
]

[tool.uv.sources]
dooers-protocol = { path = "../dooers-protocol", editable = true }

[project.urls]
Repository = "https://github.com/Dooers-ai/dooers-cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dooers_push"]

[project.optional-dependencies]
dev = [
    "mypy>=1.20.1",
    "poethepoet>=0.44.0",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.11",
    "build>=1.4.3",
    "respx>=0.21.1",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "BLE"]

[tool.ruff.lint.per-file-ignores]
"src/dooers_push/gcp/cloudbuild.py" = ["E501"]
"tests/test_lb_manager.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"

[[tool.mypy.overrides]]
module = ["google.*", "slowapi.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
testpaths = ["tests"]

[tool.poe.tasks]
format = "ruff format ."
"format:imports" = "ruff check --select I --fix ."
check = "ruff check ."
"check:fix" = "ruff check --fix ."
typecheck = "mypy src/dooers_push"
test = "pytest"
"test:cov" = "pytest --cov=src --cov-report=term-missing"
dev = ["check", "typecheck", "test"]
build = "python -m build"
serve = "uvicorn dooers_push.main:app --host 0.0.0.0 --port 8080 --reload"
