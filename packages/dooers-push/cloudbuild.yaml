# Build the dooers-push image with the build context set to the monorepo
# `packages/` directory, so the Dockerfile can COPY the dooers-protocol
# sibling. Invoke with the packages/ dir as the upload source:
#
#   gcloud builds submit packages/ \
#     --config=packages/dooers-push/cloudbuild.yaml \
#     --substitutions=_IMAGE=us-central1-docker.pkg.dev/dooers-services/services/dooers-push:v1 \
#     --project=dooers-services
#
# (.venv, caches, etc. are skipped automatically via the repo .gitignore.)
steps:
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-f', 'dooers-push/Dockerfile', '-t', '${_IMAGE}', '.']
images:
  - '${_IMAGE}'
options:
  logging: CLOUD_LOGGING_ONLY
