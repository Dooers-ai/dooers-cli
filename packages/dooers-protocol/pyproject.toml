[project]
name = "dooers-protocol"
version = "0.6.1"
description = "Dooers — wire protocol shared between CLI and dooers-push service"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    {name = "Dooers", email = "dev@dooers.ai"},
]
keywords = ["dooers", "protocol", "pydantic", "cli"]
dependencies = [
    "pydantic>=2.13.2",
]

[project.urls]
Repository = "https://github.com/Dooers-ai/dooers-cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dooers/protocol", "src/dooers_protocol"]

[project.optional-dependencies]
dev = [
    "mypy>=1.20.1",
    "poethepoet>=0.44.0",
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.11",
    "build>=1.4.3",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
mypy_path = "src"
explicit_package_bases = true

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.poe.tasks]
format = "ruff format ."
check = "ruff check ."
"check:fix" = "ruff check --fix ."
typecheck = "mypy -p dooers.protocol"
test = "pytest"
"test:cov" = "pytest --cov=src --cov-report=term-missing"
dev = ["check", "typecheck", "test"]
build = "python -m build"
