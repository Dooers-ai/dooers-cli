name: Publish Protocol to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish:
    if: startsWith(github.event.release.tag_name, 'protocol-v')
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
        working-directory: packages/dooers-protocol
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/dooers-protocol/dist
